buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

// Provide repositories for ALL subprojects (including react-native libraries).
// org.asyncstorage.shared_storage:storage-android:1.0.0 is bundled as a local
// Maven repo inside the async-storage npm package — we must include it here
// so Gradle can resolve it during the build.
allprojects {
    repositories {
        google()
        mavenCentral()
        // storage-android:1.0.0 is bundled inside the async-storage npm package
        maven {
            url = uri("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
        maven { url "https://www.jitpack.io" }
    }
}

apply plugin: "com.facebook.react.rootproject"
